name: Auto Merge Develop to Main

on:
  push:
    branches: [ develop ]

permissions:
  contents: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge develop to main
        run: |
          git checkout main
          git merge origin/develop --no-ff -m "Auto-merge: develop → main" --no-commit
          git commit --author="${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>" -m "Auto-merge: develop → main (${{ github.sha }})"
          git push origin main